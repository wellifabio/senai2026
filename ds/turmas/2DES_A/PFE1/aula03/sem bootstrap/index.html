<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar"> <!--Barra de Navegação-->
        <div class="logo">TechStore</div>
        <ul class="links">
            <li>Home</li>
            <li>Produtos</li>
        </ul>
    </nav>
    <header class="ofertas">
        <h1>As melhores ofertas</h1>
    </header>
    <main class="container">
        <div class="grid-produtos">
            <div class="card">
                <img src="https://http2.mlstatic.com/D_NQ_NP_957441-MLA107661367095_022026-O.webp" alt="Produto">
                <h3>Smartphone Samsung S26</h3>
                <p>R$ 5.000,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>
            <div class="card">
                <img src="https://cdn.awsli.com.br/684/684977/produto/290262631/poli-m424h115z2.jpg" alt="Produto">
                <h3>Polystation 5</h3>
                <p>R$ 300,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>
        </div>
    </main>
</body>

</html>
