<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receitas da Dona Benta</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>Receitas da Dona Benta</h1>

<button onclick="cadastro.classList.remove('oculto')">
Adicionar Receita
</button>

</header>


<main></main>



<!-- MODAL CADASTRO -->

<div id="cadastro" class="modal oculto">

<div class="janela">

<h2>Adicionar Receita</h2>

<form id="formCad">

<label>Nome da Receita</label>
<input type="text" id="nome" required>


<label>Tipo</label>
<select id="tipo">
<option value="SALGADA">Salgada</option>
<option value="DOCE">Doce</option>
<option value="BEBIDA">Bebida</option>
</select>


<label>Ingredientes</label>
<textarea id="ingredientes" required></textarea>


<label>Modo de Preparo</label>
<textarea id="modoFazer" required></textarea>


<label>URL da imagem</label>
<input type="text" id="urlImagem">


<label>Custo Aproximado</label>
<input type="number" id="custoAproximado">


<br><br>

<button type="reset" onclick="cadastro.classList.add('oculto')">
Cancelar
</button>

<button type="submit">
Salvar
</button>

</form>

</div>

</div>



<!-- MODAL DETALHES / EDIÇÃO -->

<div id="detalhes" class="modal oculto">

<div class="janela">

<h2 id="tituloReceita"></h2>

<img id="imgReceita">

<p><b>Nome</b></p>
<input type="text" id="nomeEdit">
<p><b>Imagem (URL)</b></p>
<input type="text" id="imgEdit">
<p><b>Tipo</b></p>
<select id="tipoEdit">
<option value="SALGADA">Salgada</option>
<option value="DOCE">Doce</option>
<option value="BEBIDA">Bebida</option>
</select>


<p><b>Ingredientes</b></p>
<textarea id="ingredientesEdit"></textarea>


<p><b>Modo de preparo</b></p>
<textarea id="modoEdit"></textarea>


<p><b>Custo aproximado</b></p>
<input type="number" id="custoEdit">


<br><br>

<button onclick="salvarEdicao()">Salvar</button>

<button onclick="excluirReceitaAtual()">Excluir</button>

<button onclick="detalhes.classList.add('oculto')">
Fechar
</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
