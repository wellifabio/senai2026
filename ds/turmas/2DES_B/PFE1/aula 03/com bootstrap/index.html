<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Minha Loja Bootstrap</title>
</head>
<body class="bg-light">

    <!-- Navbar pronta -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">TechStore</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="#">Home</a>
                <a class="nav-link" href="#">Produtos</a>
            </div>
        </div>
    </nav>

    <!-- Hero com Utility Classes -->
    <header class="bg-primary text-white text-center py-5 mb-4">
        <div class="container">
            <h1 class="fw-light">As melhores ofertas</h1>
        </div>
    </header>

    <!-- Grid Responsivo Sistema de 12 colunas -->
    <main class="container">
        <div class="row">
            
            <!-- Card Produto 1 -->
            <div class="col-12 col-md-4 mb-4">
                <div class="card shadow-sm">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Produto">
                    <div class="card-body text-center">
                        <h5 class="card-title">Smartphone X</h5>
                        <p class="card-text text-muted">R$ 1.999,00</p>
                        <a href="#" class="btn btn-success w-100">Comprar</a>
                    </div>
                </div>
            </div>

            <!-- Repetir o bloco acima para Produto 2 e 3 -->

        </div>
    </main>

</body>
</html>
