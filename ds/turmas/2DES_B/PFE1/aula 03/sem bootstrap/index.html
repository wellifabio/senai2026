<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Minha Loja Retro</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">TechStore</div>
        <ul class="links">
            <li>Home</li>
            <li>Produtos</li>
        </ul>
    </nav>

    <header class="hero">
        <h1>As melhores ofertas</h1>
    </header>

    <main class="container">
        <div class="grid-produtos">
            <!-- Card de Exemplo -->
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="Produto">
                <h3>Smartphone X</h3>
                <p>R$ 1.999,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>
            <!-- Repetir o card 3 vezes -->
        </div>
    </main>
</body>
</html>
